spring:
  application:
    name: tool
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:tooldb}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

ai:
  service:
    url: ${AI_SERVICE_URL:http://localhost:5000}

server:
  port: 8080